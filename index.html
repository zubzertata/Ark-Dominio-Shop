<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARK Dominios Shop</title>
    <style>
        :root {
            --bg-main: #070a13;
            --bg-card: #111927;
            --bg-hover: #1c283c;
            --accent: #38bdf8;
            --accent-hover: #0ea5e9;
            --vip-color: #fbbf24;
            --vip-bg: rgba(251, 191, 36, 0.08);
            --text-main: #f8fafc;
            --text-muted: #4b5563;
            --text-secondary: #9ca3af;
            --success: #10b981;
            --border: #1f2937;
            --fav-color: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            background-color: var(--bg-main); 
            color: var(--text-main); 
            padding: 20px;
            overflow-y: scroll;
        }

        /* Responsive Dual-Column Split */
        .layout-container {
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 25px;
            max-width: 1450px;
            margin: auto;
        }

        /* --- STICKY APP FILTER CONTROLS HEADER --- */
        .sticky-header-container {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--bg-main);
            padding-bottom: 15px;
        }

        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            background: var(--bg-card);
            padding: 15px 25px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        h1 { 
            color: var(--accent); 
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .header-toggles {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        /* General Badge Toggle Switches */
        .toggle-capsule {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s ease;
            border: 1px solid var(--border);
        }

        .toggle-vip { background: var(--vip-bg); color: var(--vip-color); border-color: rgba(251, 191, 36, 0.2); }
        .toggle-fav { background: rgba(239, 68, 68, 0.05); color: #f87171; border-color: rgba(239, 68, 68, 0.15); }

        .switch { position: relative; display: inline-block; width: 34px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #374151; transition: .2s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background-color: white; transition: .2s; border-radius: 50%; }
        
        input:checked + .slider { background-color: currentColor; }
        input:checked + .slider:before { transform: translateX(16px); }

        /* Integrated Search controls wrapper */
        .controls-grid { 
            display: grid;
            grid-template-columns: 2fr 1fr 1fr auto;
            gap: 12px;
            background: var(--bg-card);
            padding: 12px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .search-box-wrapper { position: relative; display: flex; align-items: center; }
        .search-box-wrapper input { width: 100%; padding-right: 40px; }

        .clear-search-btn {
            position: absolute; right: 12px;
            background: transparent; border: none;
            color: var(--text-secondary); font-size: 1.2rem;
            cursor: pointer; display: none;
        }

        input[type="text"], select { 
            padding: 10px 14px; 
            border: 1px solid var(--border); 
            border-radius: 8px; 
            font-size: 14px; 
            background: #090e1a; 
            color: var(--text-main); 
            transition: all 0.2s;
        }

        input[type="text"]:focus, select:focus { 
            outline: none; border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15);
        }

        .btn-reset {
            background: #1f2937;
            color: var(--text-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0 16px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-reset:hover { background: #374151; color: white; }

        /* Live Tracker Metrics Bar */
        .summary-bar {
            background: #090e1a;
            padding: 10px 20px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }
        .summary-bar span { color: var(--text-main); font-weight: 700; }

        /* Main Structured Table Frame */
        .table-wrapper {
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: 0 4px 25px rgba(0,0,0,0.3);
        }

        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 12px 16px; border-bottom: 1px solid var(--border); }

        th { 
            background-color: #0d131f; 
            color: var(--text-secondary); 
            font-weight: 600; 
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 0.06em;
            cursor: pointer;
            user-select: none;
            transition: all 0.15s;
        }
        th:hover { background-color: var(--bg-hover); color: var(--text-main); }
        th.sort-active { color: var(--accent); }

        tbody tr { transition: background-color 0.1s; }
        tbody tr:hover { background-color: var(--bg-hover); }
        
        .row-vip { background: rgba(251, 191, 36, 0.005); }

        /* Copy Buttons CSS Components */
        .cmd-badge { 
            display: inline-flex;
            align-items: center;
            font-family: 'Fira Code', monospace; 
            color: var(--accent); 
            background: rgba(56, 189, 248, 0.06); 
            padding: 5px 10px; border-radius: 6px; 
            border: 1px solid rgba(56, 189, 248, 0.12);
            cursor: pointer; transition: all 0.15s;
            position: relative; font-weight: 700; font-size: 0.85rem;
        }
        .cmd-badge:hover { background: rgba(56, 189, 248, 0.15); transform: translateY(-1px); }
        .cmd-badge.is-vip-cmd { color: var(--vip-color); background: rgba(251, 191, 36, 0.05); border-color: rgba(251, 191, 36, 0.15); }
        .cmd-badge.is-vip-cmd:hover { background: rgba(251, 191, 36, 0.12); }

        /* Favorite Action Star */
        .btn-fav-star {
            background: transparent; border: none;
            font-size: 1.1rem; color: #374151;
            cursor: pointer; transition: transform 0.1s;
            padding: 0 4px;
        }
        .btn-fav-star:hover { transform: scale(1.2); }
        .btn-fav-star.is-fav { color: #f87171 !important; }

        .add-cart-btn {
            background: #1f2937; color: var(--text-main);
            border: 1px solid var(--border); border-radius: 6px;
            width: 30px; height: 30px; font-size: 1rem;
            cursor: pointer; display: inline-flex;
            align-items: center; justify-content: center; font-weight: bold;
            transition: all 0.15s;
        }
        .add-cart-btn:hover { background: var(--success); border-color: var(--success); color: white; }

        .price { font-weight: 700; color: var(--success); font-size: 0.95rem; }

        /* Categorization Styling tags */
        .category-container { display: flex; gap: 4px; flex-wrap: wrap; }
        .cat-badge { 
            padding: 2px 6px; border-radius: 20px; 
            font-size: 0.65rem; font-weight: 700;
            text-transform: uppercase; color: #fff;
        }
        
        .cat-dinosaurios { background: rgba(34, 197, 94, 0.12); color: #4ade80; }
        .cat-recursos { background: rgba(120, 113, 108, 0.12); color: #a8a29e; }
        .cat-consumibles { background: rgba(236, 72, 153, 0.12); color: #f472b6; }
        .cat-agricultura { background: rgba(132, 204, 22, 0.12); color: #a3e635; }
        .cat-estructuras { background: rgba(59, 130, 246, 0.12); color: #60a5fa; }
        .cat-skins { background: rgba(168, 85, 247, 0.12); color: #c084fc; }
        .cat-armaduras { background: rgba(6, 182, 212, 0.12); color: #2dd4bf; }
        .cat-armas { background: rgba(239, 68, 142, 0.12); color: #f87171; }
        .cat-municion { background: rgba(185, 28, 28, 0.12); color: #f87171; }
        .cat-artefactos { background: rgba(245, 158, 11, 0.12); color: #fbbf24; }
        .cat-extras { background: rgba(20, 184, 166, 0.12); color: #2dd4bf; }
        .cat-monturas { background: rgba(249, 115, 22, 0.12); color: #fb923c; }
        .cat-vehiculos { background: rgba(99, 102, 241, 0.12); color: #818cf8; }
        .cat-kits { background: rgba(217, 70, 239, 0.12); color: #e879f9; }
        .cat-otros { background: rgba(100, 116, 139, 0.12); color: #94a3b8; }

        .vip-tag {
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
            color: #451a03; padding: 1px 4px; border-radius: 4px;
            font-size: 0.6rem; font-weight: 800; margin-left: 5px;
        }

        /* --- STICKY CALCULATOR PANEL COMPONENT --- */
        .cart-sidebar {
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 20px; height: fit-content;
            position: sticky; top: 20px;
            display: flex; flex-direction: column;
            box-shadow: 0 4px 25px rgba(0,0,0,0.3);
        }

        .cart-title {
            font-size: 1.15rem; font-weight: 700; color: var(--accent);
            margin-bottom: 15px; display: flex; justify-content: space-between;
            align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 10px;
        }

        .cart-items-list { max-height: 380px; overflow-y: auto; margin-bottom: 15px; padding-right: 4px; }

        .cart-item {
            background: #090e1a; border: 1px solid var(--border);
            border-radius: 8px; padding: 10px; margin-bottom: 8px;
            display: flex; flex-direction: column; gap: 6px;
        }

        .cart-item-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .cart-item-name { font-weight: 600; font-size: 0.85rem; color: var(--text-main); flex: 1; padding-right: 8px; }
        .cart-item-price { color: var(--success); font-size: 0.85rem; font-weight: 700; }

        .cart-item-controls-row {
            display: flex; justify-content: space-between; align-items: center;
            border-top: 1px solid #1f2937; padding-top: 6px;
        }

        .cart-cmd-btn {
            background: rgba(56, 189, 248, 0.08); color: var(--accent);
            border: 1px solid rgba(56, 189, 248, 0.15); padding: 3px 6px;
            border-radius: 4px; font-family: 'Fira Code', monospace; font-size: 0.7rem;
            cursor: pointer; display: flex; align-items: center; gap: 3px; transition: all 0.2s;
        }
        .cart-cmd-btn:hover { background: rgba(56, 189, 248, 0.18); }
        .cart-cmd-btn.is-vip { color: var(--vip-color); background: rgba(251, 191, 36, 0.06); border-color: rgba(251, 191, 36, 0.15); }

        .cart-qty-controls { display: flex; align-items: center; gap: 6px; }
        .cart-qty-btn {
            background: #1f2937; border: 1px solid var(--border); color: var(--text-main);
            width: 22px; height: 22px; border-radius: 4px; cursor: pointer;
            font-size: 0.85rem; display: inline-flex; align-items: center; justify-content: center;
        }
        .cart-qty-btn:hover { background: var(--bg-hover); border-color: var(--accent); }

        .cart-total-section { border-top: 1px solid var(--border); padding-top: 12px; margin-bottom: 12px; }
        .cart-total-row { display: flex; justify-content: space-between; font-weight: 700; font-size: 1.05rem; margin-bottom: 12px; }

        .cart-actions { display: flex; flex-direction: column; gap: 8px; }
        .btn-action-share {
            background: var(--accent); color: #000; border: none;
            padding: 10px; border-radius: 6px; font-weight: 700;
            cursor: pointer; font-size: 0.85rem; text-align: center; transition: all 0.2s;
        }
        .btn-action-share:hover { background: var(--accent-hover); }

        /* --- MOBILE FLOATING ACTION COMPONENT --- */
        .mobile-cart-fab {
            position: fixed; bottom: 20px; right: 20px;
            width: 56px; height: 56px; border-radius: 50%;
            background: var(--accent); color: #000;
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.4);
            display: none; align-items: center; justify-content: center;
            font-size: 1.4rem; cursor: pointer; z-index: 1001;
            transition: transform 0.2s;
        }
        .mobile-cart-fab:active { transform: scale(0.9); }
        .mobile-cart-fab-badge {
            position: absolute; top: -2px; right: -2px;
            background: #f87171; color: white; border-radius: 50%;
            min-width: 20px; height: 20px; padding: 2px;
            font-size: 0.7rem; font-weight: 800; display: flex; align-items: center; justify-content: center;
        }

        .mobile-cart-close { display: none; background: transparent; border: none; color: white; font-size: 1.4rem; cursor: pointer; }

        /* --- ADVANCED ENTERPRISE RESPONSIVE MEDIA BREAKPOINTS --- */
        @media (max-width: 1024px) {
            .layout-container { grid-template-columns: 1fr; }
            
            /* Morph Cart Sidebar into Bottom Sheet Overlay */
            .cart-sidebar {
                position: fixed; top: 0; right: -100%;
                width: 100%; max-width: 350px; height: 100vh;
                z-index: 2000; transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
                border-radius: 12px 0 0 12px; border-y: none;
            }
            .cart-sidebar.open { right: 0; }
            .mobile-cart-fab { display: flex; }
            .mobile-cart-close { display: block; }
        }

        @media (max-width: 768px) {
            body { padding: 8px; }
            .sticky-header-container { top: 0; padding-bottom: 8px; }
            .header-section { flex-direction: column; gap: 10px; padding: 12px; text-align: center; }
            .controls-grid { grid-template-columns: 1fr; gap: 8px; padding: 10px; }
            .summary-bar { flex-direction: column; gap: 6px; text-align: center; font-size: 0.8rem; }
            
            /* Optimized Micro-Cards Layout */
            table, thead, tbody, th, td, tr { display: block; width: 100%; }
            thead { display: none; }
            .table-wrapper { background: transparent; border: none; }
            
            tbody tr {
                background: var(--bg-card); border: 1px solid var(--border);
                border-radius: 10px; margin-bottom: 8px; padding: 12px;
                display: grid; grid-template-columns: 1fr auto;
                grid-template-areas: 
                    "cats fav"
                    "name name"
                    "cmd cmd"
                    "price cart";
                gap: 6px; align-items: center;
            }

            td { padding: 0; border: none; font-size: 0.9rem; display: flex; }
            td:nth-child(1) { grid-area: cats; }
            td:nth-child(2) { grid-area: cmd; }
            td:nth-child(3) { grid-area: name; font-size: 0.95rem; }
            td:nth-child(4) { display: none; } /* Drop static qty column */
            td:nth-child(5) { grid-area: price; font-size: 1.05rem; }
            td:nth-child(6) { grid-area: cart; justify-content: flex-end; }
            
            /* Re-purpose quantity inside name space smoothly */
            td:nth-child(3)::after { content: " (" attr(data-qty) ")"; color: var(--text-secondary); font-size: 0.85rem; font-weight: normal; }
            
            /* Custom Placement of absolute elements inside the layout cell structure */
            tbody tr { position: relative; }
            .mobile-fav-anchor { position: absolute; top: 12px; right: 12px; grid-area: fav; display: flex; justify-content: flex-end; }
            
            .cmd-badge { width: 100%; justify-content: center; padding: 8px; font-size: 0.95rem; }
            .add-cart-btn { width: 38px; height: 38px; font-size: 1.3rem; }
        }

        /* Notifications Toast Frame */
        #toast {
            position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%);
            background: var(--success); color: white; padding: 12px 24px;
            border-radius: 30px; font-weight: bold; box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            transition: bottom 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 3000;
            text-align: center; white-space: nowrap; font-size: 0.9rem;
        }
        #toast.show { bottom: 30px; }
        .empty-state { text-align: center; padding: 30px; color: var(--text-secondary); font-size: 0.9rem; }
        
        /* Smooth Overall App Reveal Animation instead of row lag */
        .app-fade-in { animation: softReveal 0.25s ease-out forwards; }
        @keyframes softReveal { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<!-- Backdrop Dimmer for Mobile Sidebar Menu -->
<div id="sidebarBackdrop" style="position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.5);z-index:1500;display:none;" onclick="toggleMobileCart(false)"></div>

<div class="layout-container">
    
    <!-- Left Area: App Management Frame -->
    <div class="main-content-flow">
        
        <div class="sticky-header-container">
            <div class="header-section">
                <h1>🛒 ARK Tienda Pro</h1>
                
                <div class="header-toggles">
                    <label class="toggle-capsule toggle-vip">
                        <span>👑 VIP</span>
                        <div class="switch">
                            <input type="checkbox" id="vipToggle">
                            <span class="slider"></span>
                        </div>
                    </label>
                    
                    <label class="toggle-capsule toggle-fav">
                        <span>⭐ Favoritos</span>
                        <div class="switch">
                            <input type="checkbox" id="favsToggle">
                            <span class="slider"></span>
                        </div>
                    </label>
                </div>
            </div>
            
            <div class="controls-grid">
                <div class="search-box-wrapper">
                    <input type="text" id="searchInput" placeholder="🔍 Buscar por nombre o comando (ej: Giga, Pienso, Bullet)...">
                    <button class="clear-search-btn" id="clearSearchBtn">×</button>
                </div>
                
                <select id="serverFilter"></select>
                <select id="categoryFilter"></select>
                
                <button class="btn-reset" id="resetBtn">Resetear Filtros</button>
            </div>
        </div>

        <div class="summary-bar">
            <div>Resultados Filtrados: <span id="itemCount">0</span> ítems encontrados</div>
            <div>Precios Sincronizados Localmente</div>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Categoría</th>
                        <th>Comando 📋</th>
                        <th id="thNombre" class="sort-trigger">Nombre / Ítem ↕</th>
                        <th>Cant.</th>
                        <th id="thPrecio" class="sort-trigger">Precio (Pts) ↕</th>
                        <th>Añadir</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="app-fade-in">
                    <!-- Javascript DOM Injection -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Right Sidebar Area: Calculator Sheet -->
    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-title">
            <span>🧮 Calculadora de Puntos</span>
            <button class="mobile-cart-close" onclick="toggleMobileCart(false)">×</button>
        </div>
        
        <div class="cart-items-list" id="cartItemsList">
            <!-- Items injected via App Engine -->
        </div>
        
        <div class="cart-total-section">
            <div class="cart-total-row">
                <span>Total Calculado:</span>
                <span id="cartTotalPoints" style="color: var(--success);">0</span>
            </div>
            <div style="font-size: 0.8rem; color: var(--text-secondary); text-align: right;">
                Filtro Servidor: <span id="cartServerLabel" style="font-weight:700; color:var(--accent);">PVE</span>
            </div>
        </div>
        
        <div class="cart-actions">
            <button class="btn-action-share" id="shareSummaryBtn" disabled>📋 Copiar Resumen de Compra</button>
            <button class="btn-secondary" id="clearCartBtn" style="display: none; margin-top: 4px;">Vaciar Calculadora</button>
        </div>
    </div>

</div>

<!-- FAB Floating Component for Small Devices -->
<div class="mobile-cart-fab" id="mobileCartFab" onclick="toggleMobileCart(true)">
    🛒
    <div class="mobile-cart-fab-badge" id="fabCountBadge">0</div>
</div>

<div id="toast">¡Hecho!</div>

    // Debounce Processor Algorithm to optimize mobile search overhead
    function debounce(func, timeout = 180) {
        let timer;
        return (...args) => {
            clearTimeout(timer);
            timer = setTimeout(() => { func.apply(this, args); }, timeout);
        };
    }

    // System Startup Cache Sync Execution
    function bootstrapApplication() {
        // Load data from localStorage
        const savedServer = localStorage.getItem('ark_saved_server');
        const savedVip = localStorage.getItem('ark_saved_vip');
        favorites = JSON.parse(localStorage.getItem('ark_saved_favs')) || [];
        
        rawServerTypes.forEach(server => {
            const option = document.createElement('option');
            option.value = server;
            option.textContent = `Servidor: ${server}`;
            if (savedServer ? (server === savedServer) : (server === 'PVE')) option.selected = true;
            serverFilter.appendChild(option);
        });

        vipToggle.checked = savedVip !== null ? savedVip === 'true' : true;
    }

    // Reactive Dropdown updater hiding non available options dynamically
    function refreshDropdownCategories() {
        const selectedServer = serverFilter.value;
        const showVIP = vipToggle.checked;
        const showOnlyFavs = favsToggle.checked;
        
        const runtimeAvailableCats = new Set();
        
        arkData.forEach(item => {
            if (item.IsVIP && !showVIP) return;
            if (item.Precios[selectedServer] === undefined) return;
            if (showOnlyFavs && !favorites.includes(item.Id)) return;
            
            item.Categorias.forEach(cat => runtimeAvailableCats.add(cat));
        });
        
        const previousSelection = categoryFilter.value;
        categoryFilter.innerHTML = '<option value="">Todas las Categorías</option>';
        
        Array.from(runtimeAvailableCats).sort().forEach(cat => {
            const option = document.createElement('option');
            option.value = cat;
            option.textContent = cat;
            if (cat === previousSelection) option.selected = true;
            categoryFilter.appendChild(option);
        });
    }

    function formatNumber(num) {
        if (num === undefined || num === null) return "";
        return parseInt(num).toLocaleString('es-CL');
    }

    function getCatClass(cat) {
        let clean = cat.replace(/[^\w\s]/gi, '').trim().split(' ')[0].toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g, "");
        if (clean === 'skins') return 'cat-skins';
        if (cat.includes('Agricultura')) return 'cat-agricultura';
        return `cat-${clean}`;
    }

    // --- FAVORITES ENGINE CONTROLLER ---
    window.toggleFavorite = function(itemId, buttonElement) {
        const index = favorites.indexOf(itemId);
        if (index > -1) {
            favorites.splice(index, 1);
            buttonElement.innerHTML = '☆';
            buttonElement.classList.remove('is-fav');
            triggerToast("Quitado de Favoritos ⭐");
        } else {
            favorites.push(itemId);
            buttonElement.innerHTML = '★';
            buttonElement.classList.add('is-fav');
            triggerToast("¡Añadido a Favoritos! ⭐");
        }
        localStorage.setItem('ark_saved_favs', JSON.stringify(favorites));
        
        // If viewing favorites tab, hot-reload layout on favorited toggle change
        if (favsToggle.checked) {
            filterAndSortData();
        }
    };

        } else {
            cartSidebar.classList.remove('open');
            sidebarBackdrop.style.display = 'none';
        }
    };

    // --- QUANTITY CALCULATOR CONTROLS ---
    function addToCart(itemId) {
        const item = arkData.find(i => i.Id === itemId);
        if (!item) return;

        const existing = cart.find(c => c.itemId === itemId);
        if (existing) {
            existing.qty += 1;
        } else {
            cart.push({ itemId: itemId, qty: 1 });
        }
        
        triggerToast(`Sumado: ${item.Nombre}`);
        updateCartUI();
    }

    window.modifyCartQty = function(itemId, amount) {
        const cartItem = cart.find(c => c.itemId === itemId);
        if (!cartItem) return;

        cartItem.qty += amount;
        if (cartItem.qty <= 0) {
            cart = cart.filter(c => c.itemId !== itemId);
        }
        updateCartUI();
    };

    function clearCart() {
        cart = [];
        updateCartUI();
        triggerToast("Calculadora reseteada");
    }

    function updateCartUI() {
        const activeServer = serverFilter.value;
        cartServerLabel.textContent = activeServer;
        cartItemsList.innerHTML = '';
        
        if (cart.length === 0) {
            cartItemsList.innerHTML = `<div class="empty-state">La calculadora está vacía. Añade ítems con el botón +</div>`;
            cartTotalPoints.textContent = '0';
            cartCountBadge.textContent = '0';
            fabCountBadge.textContent = '0';
            clearCartBtn.style.display = 'none';
            shareSummaryBtn.disabled = true;
            return;
        }

        let totalPoints = 0;
        let totalItemsCount = 0;
        let listHtml = '';

        cart.forEach(cartItem => {
            const item = arkData.find(i => i.Id === cartItem.itemId);
            const price = parseInt(item.Precios[activeServer] || 0); 
            const rowTotal = price * cartItem.qty;
            
            totalPoints += rowTotal;
            totalItemsCount += cartItem.qty;

            const isVipClass = item.IsVIP ? 'is-vip' : '';

            listHtml += `
                <div class="cart-item">
                    <div class="cart-item-header">
                        <span class="cart-item-name">${item.Nombre}</span>
                        <span class="cart-item-price">${formatNumber(rowTotal)} pts</span>
                    </div>
                    <div class="cart-item-controls-row">
                        <button class="cart-cmd-btn ${isVipClass}" onclick="copyCommand('${item.Comando}', this)">
                            📋 Copiar Código
                        </button>
                        <div class="cart-qty-controls">
                            <button class="cart-qty-btn" onclick="modifyCartQty(${item.Id}, -1)">-</button>
                            <span style="font-weight:600; font-size:0.85rem; min-width:18px; text-align:center;">${cartItem.qty}</span>
                            <button class="cart-qty-btn" onclick="modifyCartQty(${item.Id}, 1)">+</button>
                        </div>
                    </div>
                </div>
            `;
        });

        cartItemsList.innerHTML = listHtml;
        cartTotalPoints.textContent = formatNumber(totalPoints);
        cartCountBadge.textContent = totalItemsCount;
        fabCountBadge.textContent = totalItemsCount;
        clearCartBtn.style.display = 'block';
        shareSummaryBtn.disabled = false;
    }

    // Copy formatted summary for external apps (Discord/WhatsApp)
    function copyCartSummaryText() {
        if (cart.length === 0) return;
        const activeServer = serverFilter.value;
        
        let summary = `📋 *RESUMEN DE COMPRA - ARK DOMINIO*\n`;
        summary += `🌐 Servidor: ${activeServer}\n`;
        summary += `-----------------------------------------\n`;
        
        let total = 0;
        cart.forEach(c => {
            const item = arkData.find(i => i.Id === c.itemId);
            const subtotal = parseInt(item.Precios[activeServer] || 0) * c.qty;
            total += subtotal;
            summary += `• ${c.qty}x ${item.Nombre} [${formatNumber(subtotal)} pts]\n`;
        });
        
        summary += `-----------------------------------------\n`;
        summary += `💰 *TOTAL CALCULADO:* ${formatNumber(total)} pts`;

        navigator.clipboard.writeText(summary).then(() => {
            triggerToast("¡Resumen copiado para Discord/WhatsApp! 🚀");
        });
    }

    window.copyCommand = function(cmd, element) {
        navigator.clipboard.writeText(cmd).then(() => {
            const oldText = element.innerHTML;
            element.innerHTML = "¡Copiado!";
            element.style.background = "var(--success)";
            element.style.color = "white";
            element.style.borderColor = "var(--success)";
            
            setTimeout(() => {
                element.innerHTML = oldText;
                element.style = ""; 
            }, 1200);
        });
    };

    function triggerToast(message) {

        if (data.length === 0) {
            tableBody.innerHTML = `<tr><td colspan="6" class="empty-state">No se encontraron resultados para tu búsqueda actual.</td></tr>`;
            return;
        }

        let html = '';
        data.forEach((item) => {
            const price = item.Precios[currentServer];
            const isFav = favorites.includes(item.Id);
            
            let catHtml = '<div class="category-container">';
            item.Categorias.forEach(cat => {
                catHtml += `<span class="cat-badge ${getCatClass(cat)}">${cat}</span>`;
            });
            catHtml += '</div>';

            const vipTag = item.IsVIP ? `<span class="vip-tag">VIP</span>` : '';
            const rowClass = item.IsVIP ? 'row-vip' : '';
            const cmdClass = item.IsVIP ? 'cmd-badge is-vip-cmd' : 'cmd-badge';
            
            const starChar = isFav ? '★' : '☆';
            const starClass = isFav ? 'btn-fav-star is-fav' : 'btn-fav-star';

            html += `
                <tr class="${rowClass}">
                    <td>${catHtml}</td>
                    <td>
                        <span class="${cmdClass}" onclick="copyCommand('${item.Comando}', this)">
                            ${item.Comando}
                        </span>
                    </td>
                    <td style="font-weight: 500;" data-qty="x${item.Cantidad}">
                        ${item.Nombre} ${vipTag}
                    </td>
                    <td style="font-weight: 600; color: var(--text-secondary); font-size: 0.85rem;">x${item.Cantidad}</td>
                    <td><span class="price">${formatNumber(price)}</span></td>
                    <td>
                        <div style="display:flex; align-items:center; gap:10px;">
                            <button class="add-cart-btn" onclick="addToCart(${item.Id})">+</button>
                            <div class="mobile-fav-anchor">
                                <button class="${starClass}" onclick="toggleFavorite(${item.Id}, this)">${starChar}</button>
                            </div>
                        </div>
                    </td>
                </tr>
            `;
        });
        
        tableBody.innerHTML = html;
        
        // Soft trigger app fade re-render animation safely
        tableBody.classList.remove('app-fade-in');
        void tableBody.offsetWidth; // Trigger reflow
        tableBody.classList.add('app-fade-in');
    }

    function getExpandedSearchTerms(searchTerm) {
        let terms = [searchTerm];
        const words = searchTerm.split(' ');
        words.forEach(word => {
            if (translationMap[word]) terms.push(translationMap[word]);
        });
        return terms;
    }

    function filterAndSortData() {
        const rawSearch = searchInput.value.toLowerCase().trim();
        const selectedCategory = categoryFilter.value;
        const selectedServer = serverFilter.value;
        const showVIP = vipToggle.checked;
        const showOnlyFavs = favsToggle.checked;

        clearSearchBtn.style.display = rawSearch ? 'block' : 'none';

        localStorage.setItem('ark_saved_server', selectedServer);
        localStorage.setItem('ark_saved_vip', showVIP);

        const searchTerms = getExpandedSearchTerms(rawSearch);

        let processedData = arkData.filter(item => {
            // 1. VIP Filter Condition
            if (item.IsVIP && !showVIP) return false;
            
            // 2. Favorites Filter Condition
            if (showOnlyFavs && !favorites.includes(item.Id)) return false;

            // 3. Server Bound Cost Check
            if (item.Precios[selectedServer] === undefined) return false;

            // 4. Word Token Search Condition
            const itemText = (item.Nombre + " " + item.Comando).toLowerCase();
            const matchesSearch = rawSearch === "" || searchTerms.some(term => itemText.includes(term));
            if (!matchesSearch) return false;

            // 5. Taxonomy Category Condition
            const matchesCategory = selectedCategory === "" || item.Categorias.includes(selectedCategory);
            if (!matchesCategory) return false;

            return true;
        });

        // Apply Sorting Matrix
        if (currentSort.column === 'nombre') {
            processedData.sort((a, b) => {
                return currentSort.direction === 'asc' ? a.Nombre.localeCompare(b.Nombre) : b.Nombre.localeCompare(a.Nombre);
            });
        } else if (currentSort.column === 'precio') {
            processedData.sort((a, b) => {
                const priceA = parseInt(a.Precios[selectedServer] || 0);
                const priceB = parseInt(b.Precios[selectedServer] || 0);
                return currentSort.direction === 'asc' ? priceA - priceB : priceB - priceA;
            });
        }

        itemCountSpan.textContent = processedData.length;
        renderTable(processedData, selectedServer);
    }

    function handleSortClick(column, thElement) {
        document.querySelectorAll('th.sort-trigger').forEach(th => th.classList.remove('sort-active'));
        
        if (currentSort.column === column) {
            currentSort.direction = currentSort.direction === 'asc' ? 'desc' : 'asc';
        } else {
            currentSort.column = column;
            currentSort.direction = 'asc';
        }
        
        thElement.classList.add('sort-active');
        filterAndSortData();
    }

    function resetAllFilters() {
        searchInput.value = '';
        categoryFilter.value = '';
        favsToggle.checked = false;
        refreshDropdownCategories();
        filterAndSortData();
        triggerToast("Filtros limpiados");
    }

    // --- PERFORMANCE DEBOUNCED TRIGGER BINDINGS ---
    searchInput.addEventListener('input', debounce(filterAndSortData, 180));
    
    categoryFilter.addEventListener('change', filterAndSortData);
    
    serverFilter.addEventListener('change', () => {
        refreshDropdownCategories();
        filterAndSortData();
        updateCartUI(); 
    });
    
    vipToggle.addEventListener('change', () => {
        refreshDropdownCategories();
        filterAndSortData();
    });

    favsToggle.addEventListener('change', () => {
        refreshDropdownCategories();
        filterAndSortData();
    });
    
    clearSearchBtn.addEventListener('click', () => {
        searchInput.value = '';
        filterAndSortData();
    });

    resetBtn.addEventListener('click', resetAllFilters);

    document.getElementById('thNombre').addEventListener('click', function() { handleSortClick('nombre', this); });
    document.getElementById('thPrecio').addEventListener('click', function() { handleSortClick('precio', this); });
    
    clearCartBtn.addEventListener('click', clearCart);
    shareSummaryBtn.addEventListener('click', copyCartSummaryText);

    // Boot execution
    bootstrapApplication();
    refreshDropdownCategories();
    filterAndSortData();
    updateCartUI();

</script>

</body>
</html>
